<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Medicine - MedReminder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" onclick="toggleSidebar()">☰</button>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="s-logo">💊</div>
      <h2>MedReminder</h2>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="status.html"><span class="nav-icon">🕒</span> Status</a>
      <a href="add-medicine.html" class="active"><span class="nav-icon">➕</span> Add Medicine</a>
      <a href="medicine-list.html"><span class="nav-icon">💊</span> Medicine List</a>
      <a href="low-stock.html"><span class="nav-icon">⚠️</span> Low Stock</a>
      <a href="history.html"><span class="nav-icon">📜</span> History</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="name" id="userName">Admin</div>
          <div class="role">User</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Logout">Log Out 🚪</button>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>➕ Add New Medicine</h1>
      <p>Fill in the details below to add a new medicine to your schedule.</p>
    </div>

    <div class="card">
      <form id="addMedicineForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="medName">Medicine Name *</label>
            <input type="text" id="medName" placeholder="e.g. Paracetamol" required>
          </div>
          <div class="form-group">
            <label for="medDosage">Dosage *</label>
            <input type="text" id="medDosage" placeholder="e.g. 500mg" required>
          </div>
          <div class="form-group">
            <label for="medQuantity">Quantity (doses)</label>
            <input type="number" id="medQuantity" placeholder="e.g. 30" min="0" value="30">
          </div>
          <div class="form-group">
            <label for="medMinStockAlert">Minimum Stock Alert</label>
            <input type="number" id="medMinStockAlert" placeholder="e.g. 5" min="0" value="5">
          </div>
          <div class="form-group">
            <label for="medFrequency">Frequency</label>
            <select id="medFrequency">
              <option value="Once Daily">Once Daily</option>
              <option value="Twice Daily">Twice Daily</option>
              <option value="Three Times Daily">Three Times Daily</option>
              <option value="As Needed">As Needed</option>
            </select>
          </div>
          <div class="form-group">
            <label for="medStartDate">Start Date</label>
            <input type="date" id="medStartDate">
          </div>
          <div class="form-group">
            <label for="medEndDate">End Date</label>
            <input type="date" id="medEndDate">
          </div>
          <div class="form-group full-width">
            <label>Reminder Times *</label>
            <div id="timeSlots" style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
              <input type="time" class="time-slot" style="width: auto; padding: 10px 14px; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit;" required>
              <button type="button" class="btn btn-secondary btn-sm" onclick="addTimeSlot()">+ Add Time</button>
            </div>
          </div>
          <div class="form-group full-width">
            <label for="medNotes">Notes (Optional)</label>
            <textarea id="medNotes" rows="3" placeholder="e.g. Take after meals" style="resize: vertical;"></textarea>
          </div>
        </div>
        <div class="form-actions" style="margin-top: 24px;">
          <button type="submit" class="btn btn-primary">💾 Save Medicine</button>
          <button type="reset" class="btn btn-secondary">🔄 Reset</button>
        </div>
      </form>
    </div>
  </main>

  <!-- EmailJS Library & Logic -->
  <script src="js/config.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="js/email.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/medicine.js"></script>
  <script src="js/reminder.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    const user = getCurrentUser();
    document.getElementById('userName').textContent = user.name || user.username;
    document.getElementById('userAvatar').textContent = (user.name || user.username || 'U')[0].toUpperCase();

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Set default start date to today
    document.getElementById('medStartDate').value = new Date().toISOString().split('T')[0];

    // Auto-fill time slots based on frequency
    document.getElementById('medFrequency').addEventListener('change', function() {
      const container = document.getElementById('timeSlots');
      const slots = container.querySelectorAll('.time-slot');
      // Remove extra slots
      while (slots.length > 1) {
        slots[slots.length - 1].remove();
      }

      const freq = this.value;
      if (freq === 'Once Daily') {
        slots[0].value = '08:00';
      } else if (freq === 'Twice Daily') {
        slots[0].value = '08:00';
        addTimeSlot('20:00');
      } else if (freq === 'Three Times Daily') {
        slots[0].value = '08:00';
        addTimeSlot('14:00');
        addTimeSlot('20:00');
      }
    });

    function addTimeSlot(defaultVal = '') {
      const container = document.getElementById('timeSlots');
      const addBtn = container.querySelector('.btn');
      const input = document.createElement('input');
      input.type = 'time';
      input.className = 'time-slot';
      input.value = defaultVal;
      input.style.cssText = 'width: auto; padding: 10px 14px; background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit;';

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'btn btn-danger btn-sm';
      removeBtn.textContent = '✕';
      removeBtn.onclick = function() {
        input.remove();
        removeBtn.remove();
      };

      container.insertBefore(input, addBtn);
      container.insertBefore(removeBtn, addBtn);
    }

    // Submit form
    document.getElementById('addMedicineForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const times = [];
      document.querySelectorAll('.time-slot').forEach(slot => {
        if (slot.value) times.push(slot.value);
      });

      if (times.length === 0) {
        showToast('Error', 'Please add at least one reminder time.', 'error');
        return;
      }

      const medicine = {
        name: document.getElementById('medName').value.trim(),
        dosage: document.getElementById('medDosage').value.trim(),
        quantity: parseInt(document.getElementById('medQuantity').value) || 0,
        frequency: document.getElementById('medFrequency').value,
        startDate: document.getElementById('medStartDate').value,
        endDate: document.getElementById('medEndDate').value,
        times: times,
        notes: document.getElementById('medNotes').value.trim(),
        minStockAlert: isNaN(parseInt(document.getElementById('medMinStockAlert').value)) ? 5 : parseInt(document.getElementById('medMinStockAlert').value)
      };

      addMedicine(medicine);
      showToast('Medicine Added', `${medicine.name} has been added to your schedule.`, 'success');
      this.reset();
      document.getElementById('medStartDate').value = new Date().toISOString().split('T')[0];

      // Remove extra time slots
      const container = document.getElementById('timeSlots');
      const slots = container.querySelectorAll('.time-slot');
      while (slots.length > 1) {
        const rmBtns = container.querySelectorAll('.btn-danger');
        if (rmBtns.length > 0) {
          rmBtns[rmBtns.length - 1].previousElementSibling.remove();
          rmBtns[rmBtns.length - 1].remove();
        } else break;
      }
    });

    startReminders();
  </script>
</body>
</html>
