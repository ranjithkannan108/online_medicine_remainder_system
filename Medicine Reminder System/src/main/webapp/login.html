<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to MedReminder">
  <title>Login - MedReminder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #ffffff;">
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-icon">💊</div>
        <h1>MedReminder</h1>
        <p>Sign in to manage your medicines</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
        </div>
        <div id="errorMsg" class="error-msg">Invalid username or password</div>
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
      </form>


      <div style="text-align: center; margin-top: 15px;">
        <p style="font-size: 0.85rem; color: var(--gray-500);">Don't have an account? <a href="register.html" style="color: var(--primary); font-weight: 500;">Register here</a></p>
      </div>

      <div style="text-align: center; margin-top: 14px;">
        <a href="index.html" style="color: #0f766e; font-size: 0.82rem; font-weight: 500;">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    redirectIfLoggedIn();

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');

      const result = await login(username, password);
      if (result.success) {
        window.location.href = 'dashboard.html';
      } else {
        errorEl.textContent = result.message;
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
