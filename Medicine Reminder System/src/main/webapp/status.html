<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - MedReminder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Hamburger -->
  <button class="hamburger" id="hamburger" onclick="toggleSidebar()">☰</button>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="s-logo">💊</div>
      <h2>MedReminder</h2>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Main</div>
      <a href="index.html"><span class="nav-icon">🏠</span> Home</a>
      <a href="dashboard.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="status.html" class="active"><span class="nav-icon">🕒</span> Status</a>
      <a href="add-medicine.html"><span class="nav-icon">➕</span> Add Medicine</a>
      <a href="medicine-list.html"><span class="nav-icon">💊</span> Medicine List</a>
      <a href="low-stock.html"><span class="nav-icon">⚠️</span> Low Stock</a>
      <a href="history.html"><span class="nav-icon">📜</span> History</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="userAvatar">A</div>
        <div class="user-info">
          <div class="name" id="userName">Admin</div>
          <div class="role">User</div>
        </div>
        <button class="logout-btn" onclick="logout()" title="Logout">Log Out 🚪</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="page-header">
      <h1>🕒 Medicine Status</h1>
      <p>Log your medicines as you take them today.</p>
    </div>

    <!-- Today's Reminders -->
    <div class="card">
      <div class="card-header" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <h2>⏰ Today's Reminders</h2>
        <div class="status-filters" style="display: flex; gap: 8px;">
          <button class="btn btn-sm" style="background:#4a5568; color:white;" onclick="setFilter('all', this)">All</button>
          <button class="btn btn-sm" style="background:#f59e0b; color:white; opacity:0.6" onclick="setFilter('pending', this)">Pending</button>
          <button class="btn btn-sm" style="background:#ef4444; color:white; opacity:0.6" onclick="setFilter('missed', this)">Missed</button>
          <button class="btn btn-sm" style="background:#6c757d; color:white; opacity:0.6" onclick="setFilter('taken', this)">Taken</button>
        </div>
      </div>
      <div id="remindersList" class="reminder-list">
        <!-- Filled by JS -->
      </div>
    </div>
  </main>

  <!-- EmailJS Library & Logic -->
  <script src="js/config.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script src="js/email.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/medicine.js"></script>
  <script src="js/reminder.js"></script>
  <script>
    let currentFilter = 'all';

    function setFilter(filter, btn) {
      currentFilter = filter;
      // Update button styles
      const buttons = btn.parentElement.querySelectorAll('button');
      buttons.forEach(b => b.style.opacity = '0.6');
      btn.style.opacity = '1';
      loadStatus();
    }

    // Auth check
    if (!requireAuth()) throw new Error('Not authenticated');

    // Request notification permission
    if ('Notification' in window && Notification.permission !== 'granted') {
      Notification.requestPermission();
    }

    // Set user info
    const user = getCurrentUser();
    document.getElementById('userName').textContent = user.name || user.username;
    document.getElementById('userAvatar').textContent = (user.name || user.username || 'U')[0].toUpperCase();

    // Sidebar toggle for mobile
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    // Render status
    function loadStatus() {
      const medicines = getMedicines();
      const reminders = getTodayReminders();
      const historyToday = getHistory().filter(h => {
        const takenDate = new Date(h.takenAt).toDateString();
        return takenDate === new Date().toDateString();
      });

      // Reminders list
      const remindersList = document.getElementById('remindersList');
      if (reminders.length === 0) {
        remindersList.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📋</div>
            <h3>No reminders for today</h3>
            <p>Add medicines with scheduled times to see reminders here.</p>
          </div>
        `;
      } else {
        remindersList.innerHTML = reminders.map(med => {
          const times = typeof med.times === 'string' ? med.times.split(',') : (med.times || []);
          const now = new Date();
          const nowMins = now.getHours() * 60 + now.getMinutes();
          
          return times.map(t => {
            const timeStr = t.trim();
            const [th, tm] = timeStr.split(':');
            const medMins = parseInt(th) * 60 + parseInt(tm);
            
            const isTaken = historyToday.some(h => 
              h.medicineName === med.name && h.scheduledTime === timeStr
            );
            
            let btnHtml = '';
            let statusCategory = 'pending';
            
            if (isTaken) {
              statusCategory = 'taken';
              btnHtml = `<button class="take-btn" disabled style="background-color: #6c757d; cursor: not-allowed;">Already Taken &#10003;</button>`;
            } else if (nowMins > medMins) {
              statusCategory = 'missed';
              btnHtml = `<button class="take-btn" onclick="takeMed('${med.id}', '${timeStr}', this)" style="background-color: #ef4444;">Take Now (Missed)</button>`;
            } else {
              btnHtml = `<button class="take-btn" onclick="takeMed('${med.id}', '${timeStr}', this)">Take Now</button>`;
            }
            
            if (currentFilter !== 'all' && currentFilter !== statusCategory) {
              return '';
            }

            return `
              <div class="reminder-item">
                <div class="time-badge">${formatTime(timeStr)}</div>
                <div class="med-info">
                  <div class="med-name">${med.name}</div>
                  <div class="med-dosage">${med.dosage || 'As prescribed'} • ${med.quantity} doses left</div>
                </div>
                ${btnHtml}
              </div>
            `;
          }).join('');
        }).join('');
        
        if (!remindersList.innerHTML.trim()) {
           remindersList.innerHTML = `<div class="empty-state">
             <div class="empty-icon">✓</div>
             <h3>No ${currentFilter === 'all' ? '' : currentFilter} medicines currently!</h3>
           </div>`;
        }
      }
    }

    async function takeMed(id, timeStr, btnElement) {
      if (btnElement) {
        btnElement.disabled = true;
        btnElement.innerHTML = "Already Taken &#10003;";
        btnElement.style.backgroundColor = "#6c757d";
        btnElement.style.cursor = "not-allowed";
      }
      const medicines = getMedicines();
      const med = medicines.find(m => m.id == id);
      if (med) {
        await addToHistory(med, timeStr);
        showToast('Medicine Taken', med.name + ' marked as taken', 'success');
        setTimeout(() => loadStatus(), 1000);
      }
    }

    // Sync from server then render
    syncFromServer().then(() => {
      loadStatus();
    });

    // Also render immediately with local data
    loadStatus();

    // Start reminder system
    startReminders();
  </script>
</body>
</html>
